name: Mirror to Personal Repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    if: github.repository == 'Solutions-in-BI/judicial-juno'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to personal repo
        env:
          PERSONAL_TOKEN: ${{ secrets.PERSONAL_REPO_TOKEN }}
        run: |
          if [ -z "$PERSONAL_TOKEN" ]; then
            echo "::error::PERSONAL_REPO_TOKEN secret is empty or not set"
            exit 1
          fi
          git remote add personal "https://x-access-token:${PERSONAL_TOKEN}@github.com/wborecki/judicial-juno.git"
          git push personal main --force
